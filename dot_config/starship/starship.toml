add_newline = false
command_timeout = 1500

format = """
$conda\
$directory\
$git_branch\
$git_status\
$aws\
$lua\
$nodejs\
$python\
$rust\
$golang\
$php\
\n$character
"""

right_format = """
$time\
"""

[directory]
truncation_length = 1
# style = "fg:#ff9e64"
style = "fg:blue"
format = "[$path ]($style)"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[conda]
format = '[\($environment\)]($style) '
style = "fg:purple"
ignore_base = false

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = 'fg:yellow'
symbol = '´â» '

[aws.region_aliases]
us-east-1 = 'va'

[git_branch]
symbol = "´Éÿ"
style = "fg:#ff9e64"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#ff9e64"
format = '[($all_status$ahead_behind )]($style)'
# ~/.config/starship.toml

[lua]
format = '[¯ÿá $version](bold $style) '
style = "fg:blue"

[nodejs]
symbol = "¯£ÿ"
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[python]
format = "[$symbol($version)]($style)"
style = "fg:green"
symbol = "¯┤ø "


[rust]
symbol = "¯×¿"
style = "fg:red"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "¯ÿº"
style = "fg:blue5"
format = '[ $symbol ($version) ]($style)'

[php]
symbol = "¯ÿê"
style = "fg:#212736"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"             # Hour:Minute Format
style = "fg:comment"
format = '[ ´É║ $time ]($style)'
